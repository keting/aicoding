name: Paper Researcher

run-name: Paper Researcher (${{ inputs.report_month || 'auto-previous-month' }})

on:
  workflow_dispatch:
    inputs:
      report_month:
        description: 'Investigated month in YYYY-MM. Defaults to the previous natural month.'
        required: false
        type: string
  # schedule:
  #   - cron: '22 2 1 * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  create-agent-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Build task prompt
        id: build_prompt
        env:
          REPORT_MONTH_INPUT: ${{ inputs.report_month }}
        run: |
          ./.github/scripts/build_paper_research_prompt.sh

      - name: Research paper and create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: claude-sonnet-4.6
          FINAL_PROMPT_FILE: ${{ steps.build_prompt.outputs.final_prompt_file }}
        run: |
          ./.github/scripts/run_paper_research_task.sh